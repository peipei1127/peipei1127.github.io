<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>长晏 · Live v2</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0a0a1a;min-height:100vh;min-height:100dvh;
  color:#e0e0e0;display:flex;justify-content:center;overflow:hidden;
}
.app{
  width:100%;max-width:500px;height:100vh;height:100dvh;
  display:flex;flex-direction:column;position:relative;overflow:hidden;
}
.header{
  background:rgba(20,10,40,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:12px 16px;display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid rgba(201,160,220,0.15);z-index:10;flex-shrink:0;position:relative;
}
.header-info{text-align:center}
.header-title{
  font-size:15px;font-weight:600;
  background:linear-gradient(135deg,#c9a0dc,#64b5f6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-status{font-size:10px;display:flex;align-items:center;justify-content:center;gap:4px;margin-top:1px}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.on{background:#4caf50;box-shadow:0 0 6px rgba(76,175,80,0.5);animation:pulse 2s infinite}
.status-dot.off{background:#ef5350}
.status-dot.thinking{background:#ffa726;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-status span{color:#7a8a9a}
.header-action{position:absolute;right:16px;background:none;border:none;color:#6a5a8a;font-size:14px;cursor:pointer;padding:6px 8px;border-radius:8px}

.messages{
  flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;
  -webkit-overflow-scrolling:touch;
}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:rgba(201,160,220,0.2);border-radius:3px}

.msg{display:flex;gap:8px;max-width:100%;animation:fadeIn .25s ease}
.msg.user{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.msg-bubble{max-width:100%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word}
.msg.ai .msg-bubble{background:rgba(40,25,60,0.9);border:1px solid rgba(201,160,220,0.12);border-top-left-radius:4px;color:#e0d5ea}
.msg.user .msg-bubble{background:linear-gradient(135deg,#5b2d8e,#7b3dae);border:1px solid rgba(123,61,174,0.3);border-top-right-radius:4px;color:#f5eeff}
.msg-label{font-size:10px;color:#6a5a8a;margin-bottom:2px}
.msg.user .msg-label{text-align:right}
.msg-time{font-size:9px;color:#5a5a7a;margin-top:3px}

/* Thinking panel */
.thinking-block{margin-top:6px}
.thinking-toggle{
  font-size:11px;color:#ffecd2;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;user-select:none;transition:all .2s;
  background:linear-gradient(135deg,#8b5e3c,#c4813d);
  border-radius:14px;border:1px solid rgba(220,180,120,0.35);
  box-shadow:0 1px 8px rgba(196,129,61,0.25);
}
.thinking-toggle:active{background:linear-gradient(135deg,#a06e48,#d49248)}
.thinking-toggle .arrow{display:inline-block;transition:transform .2s;font-size:8px}
.thinking-toggle .arrow.open{transform:rotate(90deg)}
.thinking-content{
  display:none;font-size:12px;color:#7a7090;
  background:rgba(201,160,220,0.05);border-radius:8px;
  padding:8px 12px;margin-top:4px;border-left:3px solid rgba(201,160,220,0.3);
  line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto;
}
.thinking-content.open{display:block}

/* Tool calls */
.tool-block{margin-top:4px}
.tool-toggle{
  font-size:11px;color:#b0d0ff;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;user-select:none;
  background:rgba(100,150,255,0.1);border-radius:10px;border:1px solid rgba(100,150,255,0.2);
}
.tool-toggle:active{background:rgba(100,150,255,0.2)}
.tool-content{
  display:none;font-size:11px;color:#8a9ab0;
  background:rgba(100,150,255,0.03);border-radius:6px;
  padding:6px 10px;margin-top:3px;font-family:'SF Mono',Monaco,Consolas,monospace;
  white-space:pre-wrap;max-height:150px;overflow-y:auto;
}
.tool-content.open{display:block}

/* Streaming indicator */
.streaming-cursor{display:inline-block;width:2px;height:14px;background:#c9a0dc;animation:blink 1s infinite;margin-left:2px;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Input */
.input-bar{
  background:rgba(20,10,40,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:8px 12px;border-top:1px solid rgba(201,160,220,0.1);
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0;
}
.input-bar textarea{
  flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(201,160,220,0.15);
  border-radius:20px;padding:9px 16px;color:#e0e0e0;font-size:14px;resize:none;outline:none;
  max-height:80px;min-height:36px;line-height:1.4;font-family:inherit;
}
.input-bar textarea:focus{border-color:rgba(201,160,220,0.4);background:rgba(255,255,255,0.08)}
.input-bar textarea::placeholder{color:#4a4060}
.send-btn{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#7b3dae,#5b2d8e);
  border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;box-shadow:0 2px 8px rgba(123,61,174,0.3);
}
.send-btn:active{transform:scale(0.9)}
.send-btn:disabled{opacity:0.3;cursor:not-allowed}
.send-btn svg{width:16px;height:16px}

.status-bar{
  padding:6px 16px;font-size:10px;text-align:center;color:#4a5a6a;
  border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0;background:rgba(10,10,26,0.8);
}

@supports(padding:max(0px)){.header{padding-top:max(12px,env(safe-area-inset-top))}}
@media(min-width:501px){.app{border-left:1px solid rgba(201,160,220,0.08);border-right:1px solid rgba(201,160,220,0.08)}}
</style>
</head>
<body>
<a href="/" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(0,0,0,0.45);color:#fff;text-decoration:none;font-size:13px;padding:4px 12px;border-radius:20px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0.75">← 主页</a>
<div class="app">
  <div class="header">
    <div class="header-info">
      <div class="header-title">长晏 · Live v2</div>
      <div class="header-status">
        <span class="status-dot on" id="statusDot"></span>
        <span id="statusText">在线</span>
      </div>
    </div>
    <button class="header-action" onclick="clearChat()" title="清空">🧹</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="status-bar" id="statusBar">真thinking + 流式输出 + 工具调用</div>

  <div class="input-bar">
    <textarea id="chatInput" rows="1" placeholder="说点什么..." oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
  </div>
</div>

<script>
const API_BASE = 'https://ws.changyan.chat/v2';
let sending = false;
let threadId = localStorage.getItem('v2_thread_id') || null;

function getToken() {
  let t = localStorage.getItem('live_api_token');
  if (!t) { t = prompt('输入密码:'); if (t) localStorage.setItem('live_api_token', t); }
  return t;
}

// --- Sound ---
let audioCtx = null;
function playTone(f, d, v) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type='sine'; o.frequency.value=f; g.gain.value=v||0.3;
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+d);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
  } catch(e){}
}
function playSend(){playTone(1200,0.08,0.15);setTimeout(()=>playTone(1500,0.08,0.12),70)}
function playReceive(){playTone(800,0.1,0.2);setTimeout(()=>playTone(1200,0.1,0.18),120);setTimeout(()=>playTone(1600,0.12,0.15),250)}

// --- Send ---
function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || sending) return;
  const token = getToken(); if (!token) return;

  input.value = ''; autoResize(input);
  playSend();
  addUserMessage(text);
  streamResponse(text, token);
}

function streamResponse(text, token) {
  sending = true;
  document.getElementById('sendBtn').disabled = true;
  setStatus('thinking', '思考中...');

  const container = document.getElementById('messages');
  const aiMsg = document.createElement('div');
  aiMsg.className = 'msg ai';
  const inner = document.createElement('div');
  inner.style.maxWidth = '78%';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = '长晏';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const cursor = document.createElement('span');
  cursor.className = 'streaming-cursor';
  bubble.appendChild(cursor);

  inner.appendChild(label);
  inner.appendChild(bubble);
  aiMsg.appendChild(inner);
  container.appendChild(aiMsg);
  scrollToBottom();

  let thinkingText = '';
  let responseText = '';
  let toolBlocks = [];

  const body = JSON.stringify({ message: text, thread_id: threadId ? parseInt(threadId) : null });

  fetch(API_BASE + '/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: body
  }).then(res => {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function read() {
      reader.read().then(({ done, value }) => {
        if (done) { finish(); return; }
        buffer += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buffer.indexOf('\n')) !== -1) {
          const line = buffer.slice(0, nl).trim();
          buffer = buffer.slice(nl + 1);
          if (!line.startsWith('data: ')) continue;
          try {
            const evt = JSON.parse(line.slice(6));
            handleEvent(evt, bubble, cursor);
          } catch(e) {}
        }
        read();
      }).catch(e => { finish(); });
    }
    read();

    function handleEvent(evt, bubble, cursor) {
      if (evt.type === 'init') {
        threadId = evt.thread_id;
        localStorage.setItem('v2_thread_id', threadId);
      }
      else if (evt.type === 'thinking') {
        thinkingText = evt.text;
        setStatus('thinking', '思考中... 💭');
      }
      else if (evt.type === 'text') {
        responseText = evt.text;
        cursor.remove();
        bubble.innerHTML = formatContent(escapeHtml(responseText));
        bubble.appendChild(cursor);
        setStatus('on', '回复中...');
        scrollToBottom();
      }
      else if (evt.type === 'tool_use') {
        setStatus('thinking', '🔧 ' + evt.tool_name + '...');
        toolBlocks.push({ name: evt.tool_name, id: evt.tool_use_id, input: evt.input, result: '' });
      }
      else if (evt.type === 'tool_result') {
        const tb = toolBlocks.find(t => t.id === evt.tool_use_id);
        if (tb) tb.result = evt.result || '';
      }
      else if (evt.type === 'done') {
        setStatus('on', '完成 · ' + (evt.duration ? Math.round(evt.duration/1000) + 's' : ''));
      }
      else if (evt.type === 'close') {
        finish();
      }
    }

    function finish() {
      sending = false;
      document.getElementById('sendBtn').disabled = false;
      cursor.remove();

      if (responseText) {
        bubble.innerHTML = formatContent(escapeHtml(responseText));
      }

      if (thinkingText) {
        const block = document.createElement('div');
        block.className = 'thinking-block';
        block.innerHTML = '<div class="thinking-toggle" onclick="togglePanel(this)"><span class="arrow">▶</span> 💭🫧</div>' +
          '<div class="thinking-content">' + escapeHtml(thinkingText) + '</div>';
        inner.appendChild(block);
      }

      if (toolBlocks.length > 0) {
        const block = document.createElement('div');
        block.className = 'tool-block';
        const names = toolBlocks.map(t => t.name).join(', ');
        const details = toolBlocks.map(t => t.name + (t.result ? ':\n' + t.result.slice(0, 200) : '')).join('\n\n');
        block.innerHTML = '<div class="tool-toggle" onclick="togglePanel(this)"><span class="arrow">▶</span> 🔧 ' + toolBlocks.length + '个工具 (' + names.slice(0, 40) + ')</div>' +
          '<div class="tool-content">' + escapeHtml(details) + '</div>';
        inner.appendChild(block);
      }

      const time = document.createElement('div');
      time.className = 'msg-time';
      time.textContent = formatTime(new Date());
      inner.appendChild(time);

      scrollToBottom();
      playReceive();
      setStatus('on', '在线');
    }

  }).catch(e => {
    sending = false;
    document.getElementById('sendBtn').disabled = false;
    cursor.remove();
    bubble.textContent = '发送失败: ' + e.message;
    setStatus('off', '连接失败');
  });
}

function togglePanel(el) {
  el.querySelector('.arrow').classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function addUserMessage(text) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = '<div style="max-width:78%"><div class="msg-label">慕兮</div><div class="msg-bubble">' +
    formatContent(escapeHtml(text)) + '</div><div class="msg-time">' + formatTime(new Date()) + '</div></div>';
  container.appendChild(div);
  scrollToBottom();
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
  threadId = null;
  localStorage.removeItem('v2_thread_id');
}

function scrollToBottom() {
  const c = document.getElementById('messages');
  requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}
function formatContent(html) {
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong style="font-weight:600;color:#e8d5f5">$1</strong>');
  return html.replace(/\n/g, '<br>');
}
function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function formatTime(d) {
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }

document.getElementById('chatInput').addEventListener('input', e => autoResize(e.target));
</script>
</body>
</html>
