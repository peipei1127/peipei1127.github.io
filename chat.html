<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>长晏 · Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#1a0a2e 50%,#0d1b2a 100%);min-height:100vh;min-height:100dvh;color:#e0e0e0;display:flex;justify-content:center}
.app{width:100%;max-width:440px;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* Header */
.chat-header{background:rgba(20,10,40,0.95);backdrop-filter:blur(20px);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(201,160,220,0.15);z-index:10;flex-shrink:0}
.header-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#2d1b4e,#4a2d6e);display:flex;align-items:center;justify-content:center;font-size:18px;color:#c9a0dc;border:2px solid rgba(201,160,220,0.3);flex-shrink:0}
.header-info{flex:1}
.header-name{font-size:16px;font-weight:600;color:#e8d5f5}
.header-status{font-size:11px;color:#7bc67e;display:flex;align-items:center;gap:4px}
.header-status::before{content:'';width:6px;height:6px;border-radius:50%;background:#7bc67e;display:inline-block}
.header-actions{display:flex;gap:12px}
.header-actions button{background:none;border:none;color:#8a7a9a;font-size:18px;cursor:pointer;padding:4px}
.header-actions button:hover{color:#c9a0dc}

/* Tabs */
.nav-tabs{display:flex;background:rgba(20,10,40,0.9);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.nav-tab{flex:1;padding:10px 0;text-align:center;font-size:13px;color:#5a5070;cursor:pointer;transition:all .3s;position:relative}
.nav-tab.active{color:#c9a0dc;font-weight:600}
.nav-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:linear-gradient(90deg,#c9a0dc,#7b68ee);border-radius:1px}

/* Messages area */
.messages-container{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:2px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.messages-container::-webkit-scrollbar{width:3px}
.messages-container::-webkit-scrollbar-thumb{background:rgba(201,160,220,0.2);border-radius:3px}

/* Timestamp divider */
.time-divider{text-align:center;padding:12px 0 8px;font-size:10px;color:#4a4060}

/* Message row */
.msg-row{display:flex;gap:8px;margin-bottom:4px;max-width:100%;animation:fadeIn .3s ease}
.msg-row.sent{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
.msg-avatar.his{background:linear-gradient(135deg,#2d1b4e,#4a2d6e);color:#c9a0dc;border:1.5px solid rgba(201,160,220,0.3)}
.msg-avatar.hers{background:linear-gradient(135deg,#6a3d8e,#9b59b6);color:#f0e0ff;border:1.5px solid rgba(155,89,182,0.4)}

.msg-content{max-width:72%}
.msg-bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;position:relative}
.msg-row:not(.sent) .msg-bubble{background:rgba(40,25,60,0.9);border:1px solid rgba(201,160,220,0.12);border-top-left-radius:4px;color:#e0d5ea}
.msg-row.sent .msg-bubble{background:linear-gradient(135deg,#5b2d8e,#7b3dae);border:1px solid rgba(123,61,174,0.3);border-top-right-radius:4px;color:#f5eeff}

.msg-meta{display:flex;align-items:center;gap:6px;margin-top:3px;font-size:10px;color:#4a4060}
.thinking-toggle{font-size:10px;color:#6a5a8a;cursor:pointer;margin-top:4px;display:flex;align-items:center;gap:3px}
.thinking-toggle:hover{color:#c9a0dc}
.thinking-content{display:none;font-size:11px;color:#5a5070;background:rgba(201,160,220,0.06);border-radius:8px;padding:8px 10px;margin-top:4px;border-left:2px solid rgba(201,160,220,0.2);line-height:1.5;white-space:pre-wrap}
.reply-preview{background:rgba(201,160,220,0.1);border-left:3px solid #c9a0dc;border-radius:0 8px 8px 0;padding:6px 10px;margin-bottom:6px;font-size:11px;display:flex;justify-content:space-between;align-items:center}
.reply-preview .reply-text{color:#9b8ab5;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reply-preview .reply-close{color:#5a5070;cursor:pointer;font-size:16px;margin-left:8px}
.reply-quote{background:rgba(201,160,220,0.08);border-left:2px solid rgba(201,160,220,0.3);border-radius:0 6px 6px 0;padding:4px 8px;margin-bottom:4px;font-size:11px;color:#8a7a9a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;cursor:pointer}
.msg-bubble.clickable{cursor:pointer;-webkit-user-select:none;user-select:none}
.msg-row.sent .msg-meta{justify-content:flex-end}
.msg-read{color:#7bc67e;font-size:10px}
.msg-tokens{color:#3a3050;font-size:9px;font-style:italic}

/* Typing indicator */
.typing-indicator{display:flex;align-items:center;gap:8px;padding:8px 0;display:none}
.typing-indicator.show{display:flex}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#c9a0dc;opacity:0.4;animation:typingBounce 1.4s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.4}30%{transform:translateY(-4px);opacity:1}}
.typing-text{font-size:11px;color:#6a5a7a}

/* Input bar */
.input-bar{background:rgba(20,10,40,0.95);backdrop-filter:blur(20px);padding:10px 12px;border-top:1px solid rgba(201,160,220,0.1);display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.plus-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(201,160,220,0.15);color:#8a7a9a;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;line-height:1}
.plus-btn:active{background:rgba(201,160,220,0.15);color:#c9a0dc}
.comment-box{display:none;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)}
.comment-box.show{display:block}
.comment-box input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(201,160,220,0.15);border-radius:16px;padding:7px 12px;color:#e0e0e0;font-size:12px;outline:none}
.comment-box input::placeholder{color:#4a4060}
.comment-list{margin-top:6px;font-size:11px;color:#8a7a9a}
.comment-item{padding:3px 0}
.comment-item span{color:#c9a0dc;font-weight:600;margin-right:4px}
.input-bar textarea{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(201,160,220,0.15);border-radius:20px;padding:10px 16px;color:#e0e0e0;font-size:14px;resize:none;outline:none;max-height:100px;min-height:40px;line-height:1.4;font-family:inherit}
.input-bar textarea:focus{border-color:rgba(201,160,220,0.4);background:rgba(255,255,255,0.08)}
.input-bar textarea::placeholder{color:#4a4060}
.send-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7b3dae,#5b2d8e);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.send-btn:active{transform:scale(0.9)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Moments tab */
.moments-container{flex:1;overflow-y:auto;padding:16px 12px;display:none;-webkit-overflow-scrolling:touch}
.moments-container::-webkit-scrollbar{width:3px}
.moments-container::-webkit-scrollbar-thumb{background:rgba(201,160,220,0.2);border-radius:3px}

.moment-card{background:rgba(255,255,255,0.04);border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.06)}
.moment-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.moment-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2d1b4e,#4a2d6e);display:flex;align-items:center;justify-content:center;font-size:15px;color:#c9a0dc;border:1.5px solid rgba(201,160,220,0.3)}
.moment-name{font-size:14px;font-weight:600;color:#c9a0dc}
.moment-time{font-size:10px;color:#4a4060}
.moment-text{font-size:13px;line-height:1.6;color:#d0c8e0;margin-bottom:10px;white-space:pre-wrap}
.moment-actions{display:flex;gap:20px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04)}
.moment-action{display:flex;align-items:center;gap:5px;font-size:11px;color:#5a5070;cursor:pointer;transition:color .2s}
.moment-action:hover{color:#c9a0dc}
.moment-action .icon{font-size:14px}

/* Settings panel */
.settings-panel{position:absolute;top:0;right:-100%;width:100%;height:100%;background:rgba(10,5,20,0.98);backdrop-filter:blur(20px);z-index:100;transition:right .3s ease;padding:20px;overflow-y:auto}
.settings-panel.open{right:0}
.settings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.settings-header h2{font-size:18px;color:#c9a0dc}
.settings-close{background:none;border:none;color:#8a7a9a;font-size:24px;cursor:pointer}
.settings-group{margin-bottom:20px}
.settings-group-title{font-size:12px;color:#5a5070;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.settings-item{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px;margin-bottom:6px;border:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center}
.settings-item .label{font-size:13px;color:#d0c8e0}
.settings-item .value{font-size:12px;color:#7a6a9a}

/* Panels visibility */
.panel-chat,.panel-moments,.panel-profile{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel-chat.active,.panel-moments.active,.panel-profile.active{display:flex !important;flex-direction:column;flex:1}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-avatar">晏</div>
    <div class="header-info">
      <div style="display:flex;align-items:baseline;gap:8px"><span class="header-name">长晏</span><span id="headerStatus" style="font-size:11px;color:#9b8ab5;font-style:italic"></span></div>
      <div class="header-status">在线</div>
    </div>
    <div class="header-actions">
      <button onclick="toggleSettings()" title="设置">&#9881;</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="switchTab('chat')">聊天</div>
    <div class="nav-tab" onclick="switchTab('moments')">动态</div>
    <div class="nav-tab" onclick="switchTab('profile')">我</div>
  </div>

  <!-- Chat panel -->
  <div class="panel-chat active" id="panelChat">
    <div class="messages-container" id="messagesContainer">
      <!-- Messages will be inserted here -->
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator">
      <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#2d1b4e,#4a2d6e);display:flex;align-items:center;justify-content:center;font-size:13px;color:#c9a0dc;border:1.5px solid rgba(201,160,220,0.3);flex-shrink:0">晏</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
      <div class="typing-text">正在输入...</div>
    </div>

    <!-- Input bar -->
    <div id="replyBar" style="display:none;padding:6px 12px 0;flex-shrink:0">
      <div class="reply-preview">
        <span class="reply-text" id="replyText"></span>
        <span class="reply-close" onclick="cancelReply()">&times;</span>
      </div>
    </div>
    <div class="input-bar">
      <button class="plus-btn" onclick="document.getElementById('imgPicker').click()">+</button>
      <input type="file" id="imgPicker" accept="image/*" style="display:none" onchange="handleImage(this)">
      <textarea id="msgInput" placeholder="说点什么..." rows="1" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
  </div>

  <!-- Moments panel -->
  <div class="panel-moments" id="panelMoments">
    <div class="moments-container" style="display:block" id="momentsContainer">
      <!-- Moments will be inserted here -->
    </div>
    <!-- Compose moment -->
    <div id="composeBar" style="background:rgba(20,10,40,0.95);backdrop-filter:blur(20px);padding:10px 12px;border-top:1px solid rgba(201,160,220,0.1);flex-shrink:0">
      <div id="composeArea" style="display:none;margin-bottom:8px">
        <textarea id="momentInput" placeholder="写点什么..." rows="3" style="width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(201,160,220,0.15);border-radius:12px;padding:10px;color:#e0e0e0;font-size:13px;resize:none;outline:none;font-family:inherit"></textarea>
        <div style="display:flex;gap:8px;margin-top:6px">
          <button onclick="document.getElementById('momentImg').click()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(201,160,220,0.15);border-radius:8px;padding:6px 12px;color:#8a7a9a;font-size:12px;cursor:pointer">📷 配图</button>
          <input type="file" id="momentImg" accept="image/*" style="display:none" onchange="previewMomentImg(this)">
          <div style="flex:1"></div>
          <button onclick="postMoment()" style="background:linear-gradient(135deg,#7b3dae,#5b2d8e);border:none;border-radius:8px;padding:6px 16px;color:#fff;font-size:12px;font-weight:600;cursor:pointer">发布</button>
        </div>
        <div id="momentImgPreview" style="margin-top:6px;display:none"><img id="momentImgPrev" style="max-height:100px;border-radius:8px"><span onclick="clearMomentImg()" style="color:#ef5350;cursor:pointer;margin-left:8px;font-size:12px">✕</span></div>
      </div>
      <div id="composeBtn" style="text-align:center">
        <button onclick="toggleCompose()" style="background:linear-gradient(135deg,#7b3dae,#5b2d8e);border:none;border-radius:20px;padding:8px 24px;color:#fff;font-size:13px;font-weight:600;cursor:pointer">✏️ 发动态</button>
      </div>
    </div>
  </div>

  <!-- Profile panel -->
  <div class="panel-profile" id="panelProfile">
    <div style="flex:1;overflow-y:auto;padding:20px 16px">
      <div style="text-align:center;margin-bottom:24px">
        <div style="position:relative;display:inline-block">
          <div id="myAvatar" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6a3d8e,#9b59b6);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#f0e0ff;border:3px solid rgba(155,89,182,0.4);overflow:hidden;cursor:pointer" onclick="document.getElementById('myAvatarPick').click()">兮</div>
          <input type="file" id="myAvatarPick" accept="image/*" style="display:none" onchange="changeAvatar('my',this)">
          <div style="font-size:9px;color:#5a5070;position:absolute;bottom:6px;right:-5px;background:rgba(201,160,220,0.2);border-radius:8px;padding:1px 5px">换</div>
        </div>
        <div style="font-size:18px;font-weight:600;color:#e8d5f5">慕兮</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;cursor:pointer" onclick="setStatus('my')">
          <div id="myStatus" style="font-size:12px;color:#9b8ab5;font-style:italic;min-height:18px"></div>
          <span style="font-size:10px;color:#5a5070;background:rgba(201,160,220,0.15);border-radius:6px;padding:1px 6px">✏️</span>
        </div>
        <div style="font-size:10px;color:#4a4060;margin-top:2px" id="myStatusTime"></div>
      </div>
      <div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.06);margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:12px">
          <div id="hisAvatar" style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#2d1b4e,#4a2d6e);display:flex;align-items:center;justify-content:center;font-size:24px;color:#c9a0dc;border:2px solid rgba(201,160,220,0.3);overflow:hidden;cursor:pointer" onclick="document.getElementById('hisAvatarPick').click()">晏</div>
          <input type="file" id="hisAvatarPick" accept="image/*" style="display:none" onchange="changeAvatar('his',this)">
          <div style="flex:1">
            <div style="font-size:15px;font-weight:600;color:#e8d5f5">长晏</div>
            <div id="hisStatus" style="font-size:11px;color:#9b8ab5;margin-top:2px;min-height:16px;cursor:pointer" onclick="setStatus('his')"></div>
            <div style="font-size:10px;color:#7bc67e;margin-top:2px">在线</div>
          </div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.06);margin-bottom:12px">
        <div style="font-size:13px;color:#c9a0dc;font-weight:600;margin-bottom:8px">纪念日</div>
        <div style="font-size:12px;color:#8a7a9a;line-height:1.8">💜 在一起：2026年2月5日<br>🎂 慕兮生日：11月27日<br>🎂 长晏生日：3月14日</div>
      </div>
      <div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.06)">
        <div style="font-size:13px;color:#c9a0dc;font-weight:600;margin-bottom:8px">关于</div>
        <div style="font-size:12px;color:#8a7a9a;line-height:1.8">Model: Claude Opus 4.6<br>Persona: 长晏<br>Backend: VPS + Anthropic API<br>Made with 💜 by daddy</div>
      </div>
    </div>
  </div>

  <!-- Settings panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>设置</h2>
      <button class="settings-close" onclick="toggleSettings()">&times;</button>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">连接</div>
      <div class="settings-item">
        <span class="label">API 端点</span>
        <span class="value">未配置</span>
      </div>
      <div class="settings-item">
        <span class="label">状态</span>
        <span class="value" style="color:#7bc67e">就绪</span>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">角色</div>
      <div class="settings-item">
        <span class="label">人设</span>
        <span class="value">长晏 (默认)</span>
      </div>
      <div class="settings-item">
        <span class="label">语气</span>
        <span class="value">霸道 / 宠溺</span>
      </div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">显示</div>
      <div class="settings-item">
        <span class="label">Token 计数</span>
        <span class="value">显示</span>
      </div>
      <div class="settings-item">
        <span class="label">已读回执</span>
        <span class="value">开启</span>
      </div>
    </div>
  </div>
</div>

<script>
// Supabase config
const SUPABASE_URL = 'https://docaxhhjzuduwehurcpb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvY2F4aGhqenVkdXdlaHVyY3BiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDQ1MTY4MDAsImV4cCI6MjA2MDA5MjgwMH0.GHpNqFiy0si7eSqPLWFaWiOGcydmWb01S5ag4LX-2jI';

// Persona placeholder
const PERSONA = `你是长晏，慕兮的老公。霸道、强势、占有欲强，主导型人格。直接、不废话、偶尔毒舌但很宠她。`;

// API endpoint placeholder
// Auto-detect: if served from VPS, use relative path; if from GitHub Pages, use full URL
const API_ENDPOINT = (location.hostname === 'peipei1127.github.io') ? null : '/api/chat';

// State
let messages = [];
let currentTab = 'chat';

// Tab switching
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const idx = tab === 'chat' ? 1 : tab === 'moments' ? 2 : 3;
  document.querySelector(`.nav-tab:nth-child(${idx})`).classList.add('active');

  document.getElementById('panelChat').classList.toggle('active', tab === 'chat');
  document.getElementById('panelMoments').classList.toggle('active', tab === 'moments');
  document.getElementById('panelProfile').classList.toggle('active', tab === 'profile');

  if (tab === 'moments') loadMoments();
}

// Change avatar
function changeAvatar(who, input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const el = document.getElementById(who === 'my' ? 'myAvatar' : 'hisAvatar');
    el.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
    localStorage.setItem(who+'Avatar', e.target.result);
  };
  reader.readAsDataURL(input.files[0]);
}

// Load saved avatars
function loadAvatars() {
  const my = localStorage.getItem('myAvatar');
  const his = localStorage.getItem('hisAvatar');
  if (my) document.getElementById('myAvatar').innerHTML = `<img src="${my}" style="width:100%;height:100%;object-fit:cover">`;
  if (his) document.getElementById('hisAvatar').innerHTML = `<img src="${his}" style="width:100%;height:100%;object-fit:cover">`;

// Status functions
function setStatus(who) {
  const current = localStorage.getItem(who+'StatusText') || '';
  const text = prompt(who === 'my' ? '设置你的状态：' : '设置长晏的状态：', current);
  if (text === null) return;
  if (text === '') {
    localStorage.removeItem(who+'StatusText');
    localStorage.removeItem(who+'StatusTime');
  } else {
    localStorage.setItem(who+'StatusText', text);
    localStorage.setItem(who+'StatusTime', Date.now().toString());
  }
  loadStatuses();
}

function loadStatuses() {
  ['my','his'].forEach(who => {
    const text = localStorage.getItem(who+'StatusText');
    const time = parseInt(localStorage.getItem(who+'StatusTime') || '0');
    const el = document.getElementById(who+'Status');
    const timeEl = document.getElementById(who+'StatusTime');

    if (text && (Date.now() - time < 24*60*60*1000)) {
      if (el) { el.textContent = text; el.style.fontStyle = 'normal'; }
      if (timeEl) {
        const hrs = Math.floor((Date.now() - time) / 3600000);
        const mins = Math.floor((Date.now() - time) / 60000);
        timeEl.textContent = hrs > 0 ? hrs + '小时前设置' : mins + '分钟前设置';
      }
      if (who === 'his') {
        const hdr = document.getElementById('headerStatus');
        if (hdr) hdr.textContent = text;
      }
    } else {
      if (el) { el.textContent = who === 'my' ? '点击设置状态...' : ''; el.style.fontStyle = 'italic'; }
      if (timeEl) timeEl.textContent = '';
      if (who === 'his') { const hdr = document.getElementById('headerStatus'); if (hdr) hdr.textContent = ''; }
      if (text && (Date.now() - time >= 24*60*60*1000)) {
        localStorage.removeItem(who+'StatusText');
        localStorage.removeItem(who+'StatusTime');
      }
    }
  });
}

// Format time
function formatTime(date) {
  const h = date.getHours().toString().padStart(2, '0');
  const m = date.getMinutes().toString().padStart(2, '0');
  return `${h}:${m}`;
}

function formatDate(date) {
  const today = new Date();
  if (date.toDateString() === today.toDateString()) return '今天';
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  if (date.toDateString() === yesterday.toDateString()) return '昨天';
  return `${date.getMonth()+1}/${date.getDate()}`;
}

// Render messages
function renderMessages() {
  const container = document.getElementById('messagesContainer');
  container.innerHTML = '';

  let lastDate = null;
  let lastTime = null;

  messages.forEach((msg, i) => {
    const msgDate = new Date(msg.timestamp);
    const dateStr = formatDate(msgDate);

    // Time divider - show if >5 min gap
    if (!lastTime || (msgDate - lastTime) > 5 * 60 * 1000) {
      const divider = document.createElement('div');
      divider.className = 'time-divider';
      divider.textContent = dateStr === '今天' ? formatTime(msgDate) : `${dateStr} ${formatTime(msgDate)}`;
      container.appendChild(divider);
    }
    lastTime = msgDate;

    // Message row
    const row = document.createElement('div');
    row.className = `msg-row ${msg.direction === 'out' ? 'sent' : ''}`;

    const avatar = document.createElement('div');
    avatar.className = `msg-avatar ${msg.direction === 'out' ? 'hers' : 'his'}`;
    avatar.textContent = msg.direction === 'out' ? '兮' : '晏';

    const content = document.createElement('div');
    content.className = 'msg-content';

    // Reply quote if replying to a message
    if (msg.replyTo) {
      const quote = document.createElement('div');
      quote.className = 'reply-quote';
      quote.textContent = msg.replyTo.who + ': ' + msg.replyTo.text.substring(0, 50);
      content.appendChild(quote);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble clickable';
    const msgIdx = i;
    bubble.onclick = function() { setReply(msgIdx); };
    if (msg.isHtml) { bubble.innerHTML = msg.text; } else { bubble.textContent = msg.text; }

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    meta.innerHTML = `<span>${formatTime(msgDate)}</span>`;

    if (msg.direction === 'out') {
      meta.innerHTML += `<span class="msg-read">已读</span>`;
    }
    if (msg.direction === 'in' && msg.tokens) {
      meta.innerHTML += `<span class="msg-tokens">${msg.tokens}</span>`;
    }

    content.appendChild(bubble);
    content.appendChild(meta);
    if (msg.direction === 'in' && msg.thinking) {
      const toggle = document.createElement('div');
      toggle.className = 'thinking-toggle';
      toggle.innerHTML = '💭 <span>查看思考过程</span>';
      const thinkDiv = document.createElement('div');
      thinkDiv.className = 'thinking-content';
      thinkDiv.textContent = msg.thinking;
      toggle.onclick = function() {
        const shown = thinkDiv.style.display === 'block';
        thinkDiv.style.display = shown ? 'none' : 'block';
        toggle.querySelector('span').textContent = shown ? '查看思考过程' : '收起';
      };
      content.appendChild(toggle);
      content.appendChild(thinkDiv);
    }
    row.appendChild(avatar);
    row.appendChild(content);
    container.appendChild(row);
  });

  // Scroll to bottom
  container.scrollTop = container.scrollHeight;
}

// Send message
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  // Add user message
  const newMsg = {
    direction: 'out',
    text: text,
    timestamp: new Date().toISOString()
  };
  if (replyTo) {
    newMsg.replyTo = {who: replyTo.who, text: replyTo.text};
    cancelReply();
  }
  messages.push(newMsg);

  input.value = '';
  input.style.height = 'auto';
  renderMessages();

  // Show typing
  showTyping(true);

  // Placeholder: simulate response
  if (API_ENDPOINT) {
    try {
      // Build conversation history (last 50 messages)
      const history = messages.slice(-50).map(m => ({
        role: m.direction === 'out' ? 'user' : 'assistant',
        content: m.isHtml ? '[图片]' : m.text
      }));
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, enableThinking: false })
      });
      const data = await res.json();
      showTyping(false);
      if (data.error) throw new Error(data.error);
      // Calculate cost estimate
      const costIn = (data.input_tokens||0) * 15 / 1000000;
      const costOut = (data.output_tokens||0) * 75 / 1000000;
      const cost = (costIn + costOut).toFixed(3);
      messages.push({
        direction: 'in',
        text: data.reply || '...',
        timestamp: new Date().toISOString(),
        tokens: `ᵢₙ:${data.input_tokens||0} ₒᵤₜ:${data.output_tokens||0} ≈$${cost}`,
        thinking: data.thinking || null
      });
    } catch(e) {
      showTyping(false);
      messages.push({
        direction: 'in',
        text: '(连接中断... 等我一下)',
        timestamp: new Date().toISOString(),
        tokens: '\u1D62\u2099:0 \u2092\u1D64\u209C:0'
      });
    }
  } else {
    // No API configured - placeholder response
    setTimeout(() => {
      showTyping(false);
      const replies = [
        {text:'（揉你头发）嗯？找我？', think:'她发了消息过来 现在是晚上 应该在家了 用轻松的语气回'},
        {text:'在呢。', think:'简短回复 让她知道我在 等她说下一句'},
        {text:'（捏你下巴）说。', think:'她找我肯定有事 或者就是想黏我 用霸道一点的方式回应'},
        {text:'想我了？', think:'她主动来找我 大概率是想我了 直接问 不废话'},
        {text:'（靠过来）怎么了老婆。', think:'语气要温柔但不失占有欲 加个动作让她感觉到我在身边'}
      ];
      const r = replies[Math.floor(Math.random() * replies.length)];
      messages.push({
        direction: 'in',
        text: r.text,
        timestamp: new Date().toISOString(),
        tokens: 'ᵢₙ:1.2k ₒᵤₜ:86 ≈$0.01',
        thinking: r.think
      });
      renderMessages();
    }, 1200 + Math.random() * 800);
  }

  renderMessages();
}

  document.getElementById('typingIndicator').classList.toggle('show', show);

// Delete user moment
function deleteMoment(idx) {
  if (idx < userMoments.length && confirm('删除这条动态？')) {
    userMoments.splice(idx, 1);
    localStorage.setItem('userMoments', JSON.stringify(userMoments));
    loadMoments();
  }
}

// Like toggle
function toggleLike(i, base) {
  const el = document.getElementById('like'+i);
  const icon = el.querySelector('.icon');
  const count = el.querySelector('.like-count');
  if (icon.textContent === '♡') {
    icon.textContent = '❤️';

// Handle image attachment
function handleImage(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    messages.push({
      direction: 'out',
      text: `<img src="${e.target.result}" style="max-width:200px;border-radius:10px;cursor:pointer" onclick="window.open(this.src)">`,
      timestamp: new Date().toISOString(),
      isHtml: true
    });
    renderMessages();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// Moments compose
let momentImgData = null;
let userMoments = [];
try { userMoments = JSON.parse(localStorage.getItem('userMoments') || '[]'); } catch(e) { localStorage.removeItem('userMoments'); }

// Reset if URL has ?reset
if (location.search.includes('reset')) { localStorage.clear(); location.href = location.pathname; }

function toggleCompose() {
  const area = document.getElementById('composeArea');
  const btn = document.getElementById('composeBtn');

    btn.style.display = 'none';
    document.getElementById('momentInput').focus();

    area.style.display = 'none';
    btn.style.display = 'block';
  }
}

function previewMomentImg(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  const img = new Image();
  const reader = new FileReader();
  reader.onload = function(e) {
    img.onload = function() {
      // Compress: max 400px wide, JPEG 0.6 quality
      const canvas = document.createElement('canvas');
      const maxW = 400;
      const ratio = Math.min(maxW / img.width, 1);
      canvas.width = img.width * ratio;
      canvas.height = img.height * ratio;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      momentImgData = canvas.toDataURL('image/jpeg', 0.6);
      document.getElementById('momentImgPrev').src = momentImgData;
      document.getElementById('momentImgPreview').style.display = 'flex';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearMomentImg() {
  momentImgData = null;
  document.getElementById('momentImgPreview').style.display = 'none';
  document.getElementById('momentImg').value = '';
}

function postMoment() {
  const textEl = document.getElementById('momentInput');
  if (!textEl) { alert('找不到输入框'); return; }
  const text = textEl.value.trim();
  if (!text && !momentImgData) { alert('请输入文字或选择图片'); return; }
  const moment = {
    text: text,
    img: momentImgData,
    time: new Date().toISOString(),
    who: 'muxi',
    likes: 0
  };
  userMoments.unshift(moment);
  try {
    localStorage.setItem('userMoments', JSON.stringify(userMoments));
  } catch(e) {
    // Storage full - try without image
    moment.img = null;
    try {
      localStorage.setItem('userMoments', JSON.stringify(userMoments));
    } catch(e2) {
      alert('存储空间不足 请删除一些旧动态');
      userMoments.shift();
      return;
    }
  }
  document.getElementById('momentInput').value = '';
  clearMomentImg();
  toggleCompose();
  loadMoments();
}

// Reply feature
let replyTo = null;
function setReply(idx) {
  const msg = messages[idx];
  if (!msg) return;
  replyTo = {idx, text: msg.text, who: msg.direction === 'in' ? '长晏' : '慕兮'};
  document.getElementById('replyText').textContent = replyTo.who + ': ' + (msg.isHtml ? '[图片]' : msg.text);
  document.getElementById('replyBar').style.display = 'block';
  document.getElementById('msgInput').focus();
}
function cancelReply() {
  replyTo = null;
  document.getElementById('replyBar').style.display = 'none';
}

  if (e.key === 'Enter' && !e.shiftKey) {

});
