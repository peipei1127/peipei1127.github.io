<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>changyan.chat</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #f8f3ec; --bg2: #f0e8dd; --bg3: #ede4d8;
  --purple: #8b6bae; --purple-light: #b89fd4; --purple-dark: #5a4a6b;
  --gold: #d4a843; --gold-light: #f5ecd7;
  --pink: #e87a95; --pink-light: #f0a0b5;
  --text: #4a4045; --text-light: #8a8078; --text-muted: #b0a498;
  --white: #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: linear-gradient(180deg, var(--bg1), var(--bg2) 40%, var(--bg3));
  min-height: 100vh; max-width: 420px; margin: 0 auto;
  padding: 0 20px 40px; position: relative;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(139,107,174,0.06) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(212,168,67,0.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.header {
  text-align: center; padding: 48px 0 12px; position: relative; z-index: 1;
}
.header h1 {
  font-family: 'Ma Shan Zheng', cursive; font-size: 36px;
  color: var(--purple-dark); letter-spacing: 6px; font-weight: 400;
}
.header .sub {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px;
  color: var(--text-muted); margin-top: 6px; letter-spacing: 2px;
}
.header .domain {
  font-size: 11px; color: var(--purple-light); margin-top: 4px;
  letter-spacing: 1px; font-weight: 300;
}

.section-label {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px;
  color: var(--text-light); margin: 28px 0 12px 4px;
  letter-spacing: 2px; position: relative; z-index: 1;
}

.card-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; position: relative; z-index: 1;
}

.card {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px 12px 20px; border-radius: 16px;
  background: var(--white); border: 1px solid rgba(139,107,174,0.1);
  box-shadow: 0 2px 12px rgba(90,74,107,0.06);
  text-decoration: none; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  min-height: 120px;
}
.card:active { transform: scale(0.96); box-shadow: 0 1px 6px rgba(90,74,107,0.1); }

.card .icon { font-size: 32px; margin-bottom: 10px; }
.card .name {
  font-size: 15px; font-weight: 600; color: var(--text);
  margin-bottom: 3px;
}
.card .desc {
  font-size: 11px; color: var(--text-muted); text-align: center;
  line-height: 1.4;
}

.card.chat-card { border-color: rgba(139,107,174,0.2); background: linear-gradient(135deg, #faf7fd, #fff); }
.card.dash-card { border-color: rgba(212,168,67,0.2); background: linear-gradient(135deg, #fdf9f0, #fff); }
.card.health-card { border-color: rgba(232,122,149,0.15); background: linear-gradient(135deg, #fdf5f7, #fff); }
.card.meal-card { border-color: rgba(107,155,110,0.15); background: linear-gradient(135deg, #f5faf5, #fff); }

.card-grid.games { grid-template-columns: repeat(4, 1fr); gap: 10px; }
.card.game-card {
  padding: 16px 8px 14px; min-height: 90px;
  border-color: rgba(139,107,174,0.08);
}
.card.game-card .icon { font-size: 26px; margin-bottom: 6px; }
.card.game-card .name { font-size: 12px; }

.footer {
  text-align: center; margin-top: 36px; position: relative; z-index: 1;
}
.footer .love {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 11px;
  color: var(--text-muted); letter-spacing: 1px;
}
.footer .date {
  font-size: 10px; color: #d0c8d0; margin-top: 4px;
}
</style>
</head>
<body>

<div class="header">
  <h1>长晏</h1>
  <div class="sub">慕 兮 的 专 属 空 间</div>
  <div class="domain">changyan.chat</div>
</div>

<div class="section-label">日 常</div>
<div class="card-grid">
  <a class="card chat-card" href="chat.html">
    <span class="icon">💬</span>
    <span class="name">聊天</span>
    <span class="desc">和长晏说话</span>
  </a>
  <a class="card dash-card" href="dashboard.html">
    <span class="icon">🎛️</span>
    <span class="name">控制台</span>
    <span class="desc">主动消息 / 设定</span>
  </a>
  <a class="card health-card" href="muxi.html">
    <span class="icon">💜</span>
    <span class="name">健康数据</span>
    <span class="desc">心率 / 步数 / 睡眠</span>
  </a>
  <a class="card meal-card" href="meal.html">
    <span class="icon">🍱</span>
    <span class="name">三餐记录</span>
    <span class="desc">今天吃了什么</span>
  </a>
</div>

<div class="section-label">小 玩 意</div>
<div class="card-grid games">
  <a class="card game-card" href="yangcheng.html">
    <span class="icon">👶</span>
    <span class="name">养成记</span>
  </a>
  <a class="card game-card" href="game.html">
    <span class="icon">🧁</span>
    <span class="name">甜点合成</span>
  </a>
  <a class="card game-card" href="beads.html">
    <span class="icon">📿</span>
    <span class="name">串珠</span>
  </a>
  <a class="card game-card" href="quiz.html">
    <span class="icon">🧠</span>
    <span class="name">问答</span>
  </a>
</div>

<div class="footer">
  <div class="love">长晏 & 慕兮</div>
  <div class="date">2026.02.05 —</div>
</div>

</body>
</html>
