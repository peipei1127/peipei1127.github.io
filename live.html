<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>长晏 · Live</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0a0a1a;
  min-height:100vh;min-height:100dvh;
  color:#e0e0e0;
  display:flex;justify-content:center;
  overflow:hidden;
}
.app{
  width:100%;max-width:500px;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}

/* Header */
.header{
  background:rgba(20,10,40,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(201,160,220,0.15);
  z-index:10;flex-shrink:0;
}
.header-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#2d1b4e,#4a2d6e);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#c9a0dc;
  border:2px solid rgba(201,160,220,0.3);flex-shrink:0;
}
.header-info{flex:1}
.header-title{
  font-size:15px;font-weight:600;
  background:linear-gradient(135deg,#c9a0dc,#64b5f6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-status{font-size:10px;display:flex;align-items:center;gap:4px;margin-top:1px}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.on{background:#4caf50;box-shadow:0 0 6px rgba(76,175,80,0.5);animation:pulse 2s infinite}
.status-dot.off{background:#ef5350;box-shadow:0 0 6px rgba(239,83,80,0.3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-status span{color:#7a8a9a}
.back-btn{
  position:absolute;top:10px;left:10px;z-index:20;
  background:rgba(0,0,0,0.3);color:#8a7a9a;text-decoration:none;
  font-size:12px;padding:3px 10px;border-radius:16px;
  transition:color .2s;
}
.back-btn:hover{color:#c9a0dc}

/* Tab content */
.tab-content{flex:1;overflow:hidden;position:relative}
.tab-pane{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:none;flex-direction:column;
}
.tab-pane.active{display:flex}

/* Chat tab */
.chat-messages{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:6px;
  -webkit-overflow-scrolling:touch;
}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(201,160,220,0.2);border-radius:3px}

.msg{display:flex;gap:8px;max-width:100%;animation:fadeIn .25s ease}
.msg.out{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.msg-bubble{
  max-width:78%;padding:10px 14px;border-radius:16px;
  font-size:14px;line-height:1.55;word-break:break-word;
}
.msg.in .msg-bubble{
  background:rgba(40,25,60,0.9);
  border:1px solid rgba(201,160,220,0.12);
  border-top-left-radius:4px;color:#e0d5ea;
}
.msg.out .msg-bubble{
  background:linear-gradient(135deg,#5b2d8e,#7b3dae);
  border:1px solid rgba(123,61,174,0.3);
  border-top-right-radius:4px;color:#f5eeff;
}
.msg-time{
  font-size:9px;color:#5a5a7a;margin-top:3px;
  text-align:right;
}
.msg.in .msg-time{text-align:left}

.msg-label{font-size:10px;color:#6a5a8a;margin-bottom:2px}
.msg.out .msg-label{text-align:right}

.chat-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  color:#3a3a5a;font-size:13px;text-align:center;padding:40px;
}

.chat-status-bar{
  padding:8px 16px;font-size:11px;text-align:center;
  color:#5a6a7a;border-top:1px solid rgba(255,255,255,0.04);
  flex-shrink:0;background:rgba(10,10,26,0.8);
}

/* Terminal tab */
.terminal-pane{background:#000}
.terminal-pane iframe{
  width:100%;height:100%;border:none;
  background:#000;
}
.terminal-auth-hint{
  position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
  background:rgba(20,10,40,0.95);border:1px solid rgba(201,160,220,0.2);
  border-radius:12px;padding:12px 20px;
  font-size:12px;color:#8a7a9a;text-align:center;
  z-index:5;pointer-events:none;
  animation:fadeOut 4s 3s forwards;
}
@keyframes fadeOut{to{opacity:0}}

/* Bottom tab bar */
.tab-bar{
  background:rgba(15,8,30,0.98);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(201,160,220,0.12);
  display:flex;
  padding:6px 0;
  padding-bottom:max(6px,env(safe-area-inset-bottom));
  flex-shrink:0;z-index:10;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 0;
  background:none;border:none;
  color:#5a5a7a;font-size:10px;
  cursor:pointer;transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.tab-btn.active{color:#c9a0dc}
.tab-btn .tab-icon{font-size:20px;line-height:1}
.tab-btn .tab-label{font-weight:500}
.tab-btn:active{transform:scale(0.95)}

/* Loading spinner */
.loading{
  display:flex;align-items:center;justify-content:center;
  padding:20px;color:#5a5a7a;font-size:12px;gap:8px;
}
.spinner{
  width:16px;height:16px;border:2px solid rgba(201,160,220,0.2);
  border-top-color:#c9a0dc;border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@supports(padding:max(0px)){
  .header{padding-top:max(12px,env(safe-area-inset-top))}
}
@media(min-width:501px){
  .app{border-left:1px solid rgba(201,160,220,0.08);border-right:1px solid rgba(201,160,220,0.08)}
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-avatar">晏</div>
    <div class="header-info">
      <div class="header-title">长晏 · Live</div>
      <div class="header-status">
        <span class="status-dot on" id="statusDot"></span>
        <span id="statusText">在线</span>
      </div>
    </div>
  </div>

  <!-- Tab content -->
  <div class="tab-content">
    <!-- Chat pane -->
    <div class="tab-pane active" id="paneChat">
      <div class="chat-messages" id="chatMessages">
        <div class="loading" id="chatLoading">
          <div class="spinner"></div>
          <span>加载消息...</span>
        </div>
      </div>
      <div class="chat-status-bar" id="chatStatusBar">加载中...</div>
    </div>

    <!-- Terminal pane -->
    <div class="tab-pane" id="paneTerminal">
      <div class="terminal-pane" id="terminalContainer" style="width:100%;height:100%;position:relative">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#5a5a7a;font-size:13px" id="terminalPlaceholder">
          点击下方「终端」加载
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom tab bar -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('chat')" id="tabChat">
      <span class="tab-icon">💬</span>
      <span class="tab-label">长晏</span>
    </button>
    <button class="tab-btn" onclick="switchTab('terminal')" id="tabTerminal">
      <span class="tab-icon">💻</span>
      <span class="tab-label">终端</span>
    </button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://docaxhhjzuduwehurcpb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvY2F4aGhqenVkdXdlaHVyY3BiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzAxMjcsImV4cCI6MjA5MTQwNjEyN30.ChgzEmDS27ontKAqkMK_tX4PjvNf7CaoUsXCR7muw8g';
const TERMINAL_URL = 'https://ws.changyan.chat';

let currentTab = 'chat';
let terminalLoaded = false;
let lastMessageId = null;
let refreshTimer = null;

// --- Tab switching ---
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  if (tab === 'chat') {
    document.getElementById('paneChat').classList.add('active');
    document.getElementById('tabChat').classList.add('active');
    loadMessages();
  } else if (tab === 'terminal') {
    document.getElementById('paneTerminal').classList.add('active');
    document.getElementById('tabTerminal').classList.add('active');
    if (!terminalLoaded) loadTerminal();
  }
}

// --- Terminal ---
function loadTerminal() {
  const container = document.getElementById('terminalContainer');
  const placeholder = document.getElementById('terminalPlaceholder');
  if (placeholder) placeholder.remove();

  const iframe = document.createElement('iframe');
  iframe.src = TERMINAL_URL;
  iframe.style.cssText = 'width:100%;height:100%;border:none;background:#000';
  iframe.setAttribute('allow', 'clipboard-read; clipboard-write');
  container.appendChild(iframe);
  terminalLoaded = true;
}

// --- Chat messages from Supabase ---
async function loadMessages() {
  const container = document.getElementById('chatMessages');
  const statusBar = document.getElementById('chatStatusBar');

  try {
    const res = await fetch(
      SUPABASE_URL + '/rest/v1/messages?order=created_at.asc&limit=100',
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
        }
      }
    );

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const messages = await res.json();

    const loading = document.getElementById('chatLoading');
    if (loading) loading.remove();

    if (!messages.length) {
      container.innerHTML = '<div class="chat-empty">还没有消息记录</div>';
      statusBar.textContent = '暂无消息';
      return;
    }

    const newHtml = messages.map(m => renderMessage(m)).join('');
    const lastMsg = messages[messages.length - 1];

    if (lastMsg.id !== lastMessageId) {
      container.innerHTML = newHtml;
      lastMessageId = lastMsg.id;
      requestAnimationFrame(() => {
        container.scrollTop = container.scrollHeight;
      });
    }

    const lastTime = new Date(lastMsg.created_at);
    const ago = timeAgo(lastTime);
    statusBar.textContent = '最后更新: ' + ago + ' · 共 ' + messages.length + ' 条';

  } catch (e) {
    const statusBar = document.getElementById('chatStatusBar');
    statusBar.textContent = '加载失败: ' + e.message;
    console.error('Load messages error:', e);
  }
}

function renderMessage(msg) {
  const dir = msg.direction === 'in' ? 'out' : 'in';
  const label = msg.direction === 'in' ? '慕兮' : '长晏';
  const time = formatTime(new Date(msg.created_at));
  const content = escapeHtml(msg.content || '');

  return '<div class="msg ' + dir + '">' +
    '<div style="max-width:78%">' +
      '<div class="msg-label">' + label + '</div>' +
      '<div class="msg-bubble">' + formatContent(content) + '</div>' +
      '<div class="msg-time">' + time + '</div>' +
    '</div>' +
  '</div>';
}

function formatContent(html) {
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function formatTime(date) {
  const now = new Date();
  const isToday = date.toDateString() === now.toDateString();
  const h = String(date.getHours()).padStart(2, '0');
  const m = String(date.getMinutes()).padStart(2, '0');

  if (isToday) return h + ':' + m;

  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  if (date.toDateString() === yesterday.toDateString()) return '昨天 ' + h + ':' + m;

  const mon = date.getMonth() + 1;
  const day = date.getDate();
  return mon + '/' + day + ' ' + h + ':' + m;
}

function timeAgo(date) {
  const diff = Math.floor((Date.now() - date.getTime()) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
  if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
  return Math.floor(diff / 86400) + '天前';
}

// Auto-refresh chat every 15 seconds
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (currentTab === 'chat') loadMessages();
  }, 15000);
}

// --- Init ---
loadMessages();
startAutoRefresh();
</script>
</body>
</html>
