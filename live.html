<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>长晏 · Live</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" async></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0a0a1a;
  min-height:100vh;min-height:100dvh;
  color:#e0e0e0;display:flex;justify-content:center;overflow:hidden;
}
.app{
  width:100%;max-width:500px;height:100vh;height:100dvh;
  display:flex;flex-direction:column;position:relative;overflow:hidden;
}
.header{
  background:rgba(20,10,40,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(201,160,220,0.15);z-index:10;flex-shrink:0;
}
.header-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#2d1b4e,#4a2d6e);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#c9a0dc;border:2px solid rgba(201,160,220,0.3);flex-shrink:0;
}
.header-info{flex:1}
.header-title{
  font-size:15px;font-weight:600;
  background:linear-gradient(135deg,#c9a0dc,#64b5f6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header-status{font-size:10px;display:flex;align-items:center;gap:4px;margin-top:1px}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.status-dot.on{background:#4caf50;box-shadow:0 0 6px rgba(76,175,80,0.5);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-status span{color:#7a8a9a}
.header-action{
  background:none;border:none;color:#6a5a8a;font-size:14px;
  cursor:pointer;padding:6px 8px;border-radius:8px;transition:all .2s;
}
.header-action:active{background:rgba(201,160,220,0.1);color:#c9a0dc}

.tab-content{flex:1;overflow:hidden;position:relative}
.tab-pane{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column}
.tab-pane.active{display:flex}

/* Chat */
.chat-messages{
  flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;
  -webkit-overflow-scrolling:touch;
}
.chat-messages::-webkit-scrollbar{width:3px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(201,160,220,0.2);border-radius:3px}
.msg{display:flex;gap:8px;max-width:100%;animation:fadeIn .25s ease}
.msg.out{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-bubble{max-width:100%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;word-break:break-word}
.msg.in .msg-bubble{background:rgba(40,25,60,0.9);border:1px solid rgba(201,160,220,0.12);border-top-left-radius:4px;color:#e0d5ea}
.msg.out .msg-bubble{background:linear-gradient(135deg,#5b2d8e,#7b3dae);border:1px solid rgba(123,61,174,0.3);border-top-right-radius:4px;color:#f5eeff}
.msg-time{font-size:9px;color:#5a5a7a;margin-top:3px;text-align:right}
.msg.in .msg-time{text-align:left}
.msg-label{font-size:10px;color:#6a5a8a;margin-bottom:2px}
.msg.out .msg-label{text-align:right}
.thinking-block{margin-top:6px}
.thinking-toggle{
  font-size:11px;color:#ffecd2;cursor:pointer;display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;user-select:none;transition:all .2s;
  background:linear-gradient(135deg,#8b5e3c,#c4813d);
  border-radius:14px;border:1px solid rgba(220,180,120,0.35);
  box-shadow:0 1px 8px rgba(196,129,61,0.25);
}
.thinking-toggle:active{background:linear-gradient(135deg,#a06e48,#d49248)}
.thinking-toggle .arrow{display:inline-block;transition:transform .2s;font-size:8px}
.thinking-toggle .arrow.open{transform:rotate(90deg)}
.thinking-content{
  display:none;font-size:12px;color:#7a7090;
  background:rgba(201,160,220,0.05);border-radius:8px;
  padding:8px 12px;margin-top:4px;
  border-left:3px solid rgba(201,160,220,0.3);
  line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto;
}
.thinking-content::-webkit-scrollbar{width:2px}
.thinking-content::-webkit-scrollbar-thumb{background:rgba(201,160,220,0.15);border-radius:2px}
.thinking-content.open{display:block}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#3a3a5a;font-size:13px;text-align:center;padding:40px}
.chat-status-bar{
  padding:6px 16px;font-size:10px;text-align:center;color:#4a5a6a;
  border-top:1px solid rgba(255,255,255,0.04);flex-shrink:0;background:rgba(10,10,26,0.8);
}
.realtime-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:4px}
.realtime-dot.on{background:#4caf50}
.realtime-dot.off{background:#ef5350}

/* Input bar (shared) */
.input-bar{
  background:rgba(20,10,40,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:8px 12px;border-top:1px solid rgba(201,160,220,0.1);
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0;
}
.input-bar textarea{
  flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(201,160,220,0.15);
  border-radius:20px;padding:9px 16px;color:#e0e0e0;font-size:14px;resize:none;outline:none;
  max-height:80px;min-height:36px;line-height:1.4;font-family:inherit;
}
.input-bar textarea:focus{border-color:rgba(201,160,220,0.4);background:rgba(255,255,255,0.08)}
.input-bar textarea::placeholder{color:#4a4060}
.send-btn{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,#7b3dae,#5b2d8e);
  border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;box-shadow:0 2px 8px rgba(123,61,174,0.3);
}
.send-btn:active{transform:scale(0.9)}
.send-btn:disabled{opacity:0.3;cursor:not-allowed}
.send-btn svg{width:16px;height:16px}
.attach-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:1px solid rgba(201,160,220,0.15);
  color:#c9a0dc;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.attach-btn:active{background:rgba(201,160,220,0.15);transform:scale(0.9)}
.msg-img{max-width:100%;border-radius:12px;margin-top:4px;cursor:pointer}
.msg-img:active{opacity:0.8}

/* Terminal */
.terminal-pane{background:#000}
.terminal-pane iframe{width:100%;height:100%;border:none;background:#000}
.terminal-toolbar{
  display:flex;justify-content:flex-end;padding:6px 12px;
  background:rgba(0,0,0,0.9);border-bottom:1px solid rgba(201,160,220,0.08);flex-shrink:0;gap:8px;
}
.terminal-toolbar button{
  background:rgba(201,160,220,0.1);border:1px solid rgba(201,160,220,0.2);
  color:#c9a0dc;font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;transition:all .2s;
}
.terminal-toolbar button:active{background:rgba(201,160,220,0.2)}

/* Tab bar */
.tab-bar{
  background:rgba(15,8,30,0.98);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(201,160,220,0.12);display:flex;
  padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));flex-shrink:0;z-index:10;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;
  background:none;border:none;color:#5a5a7a;font-size:10px;
  cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent;
}
.tab-btn.active{color:#c9a0dc}
.tab-btn .tab-icon{font-size:20px;line-height:1}
.tab-btn .tab-label{font-weight:500}
.tab-btn:active{transform:scale(0.95)}

.loading{display:flex;align-items:center;justify-content:center;padding:20px;color:#5a5a7a;font-size:12px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid rgba(201,160,220,0.2);border-top-color:#c9a0dc;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@supports(padding:max(0px)){.header{padding-top:max(12px,env(safe-area-inset-top))}}
@media(min-width:501px){.app{border-left:1px solid rgba(201,160,220,0.08);border-right:1px solid rgba(201,160,220,0.08)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-avatar">晏</div>
    <div class="header-info">
      <div class="header-title">长晏 · Live</div>
      <div class="header-status">
        <span class="status-dot on"></span>
        <span>在线</span>
      </div>
    </div>
    <button class="header-action" onclick="loadMessages()" title="刷新">↻</button>
  </div>

  <div class="tab-content">
    <div class="tab-pane active" id="paneChat">
      <div class="chat-messages" id="chatMessages">
        <div class="loading" id="chatLoading"><div class="spinner"></div><span>加载消息...</span></div>
      </div>
      <div class="chat-status-bar" id="chatStatusBar">
        <span class="realtime-dot off" id="realtimeDot"></span>
        <span id="realtimeStatus">连接中...</span>
      </div>
      <div class="input-bar">
        <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="发图片">+</button>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="sendImages(this)">
        <textarea id="chatInput" rows="1" placeholder="说点什么..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>

    <div class="tab-pane" id="paneTerminal">
      <div class="terminal-toolbar">
        <button onclick="reloadTerminal()">重新加载</button>
        <button onclick="openFullscreen()">全屏打开 ↗</button>
      </div>
      <div style="flex:1;position:relative;background:#000;overflow:hidden" id="terminalContainer">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#5a5a7a;font-size:13px" id="terminalPlaceholder">
          点击下方「终端」加载
        </div>
      </div>
      <div class="input-bar">
        <textarea id="termInput" rows="1" placeholder="输入命令或消息..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendTerminalInput()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('chat')" id="tabChat">
      <span class="tab-icon">💬</span>
      <span class="tab-label">长晏</span>
    </button>
    <button class="tab-btn" onclick="switchTab('terminal')" id="tabTerminal">
      <span class="tab-icon">💻</span>
      <span class="tab-label">终端</span>
    </button>
  </div>
</div>

<script>
const SB_URL = 'https://docaxhhjzuduwehurcpb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvY2F4aGhqenVkdXdlaHVyY3BiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzAxMjcsImV4cCI6MjA5MTQwNjEyN30.ChgzEmDS27ontKAqkMK_tX4PjvNf7CaoUsXCR7muw8g';
const API_URL = 'https://ws.changyan.chat/api';
const TERMINAL_URL = 'https://ws.changyan.chat';
const SB_HEADERS = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

let currentTab = 'chat';
let terminalLoaded = false;
let renderedIds = new Set();
let realtimeReady = false;
let pollTimer = null;

function getToken() {
  let t = localStorage.getItem('live_api_token');
  if (!t) { t = prompt('输入密码:'); if (t) localStorage.setItem('live_api_token', t); }
  return t;
}

// --- Tab ---
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (tab === 'chat') {
    document.getElementById('paneChat').classList.add('active');
    document.getElementById('tabChat').classList.add('active');
  } else {
    document.getElementById('paneTerminal').classList.add('active');
    document.getElementById('tabTerminal').classList.add('active');
    if (!terminalLoaded) loadTerminal();
  }
}

// --- Terminal ---
function loadTerminal() {
  const c = document.getElementById('terminalContainer');
  const p = document.getElementById('terminalPlaceholder');
  if (p) p.remove();
  const iframe = document.createElement('iframe');
  iframe.id = 'terminalIframe';
  iframe.src = TERMINAL_URL;
  iframe.style.cssText = 'width:100%;height:100%;border:none;background:#000';
  iframe.setAttribute('allow','clipboard-read; clipboard-write; keyboard-map');
  c.appendChild(iframe);
  terminalLoaded = true;
}
function reloadTerminal(){const f=document.getElementById('terminalIframe');if(f)f.src=TERMINAL_URL;}
function openFullscreen(){window.open(TERMINAL_URL,'_blank');}

async function sendTerminalInput() {
  const input = document.getElementById('termInput');
  const text = input.value.trim();
  if (!text) return;
  const token = getToken(); if (!token) return;
  try {
    const r = await fetch(API_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({text})});
    if(r.status===401){localStorage.removeItem('live_api_token');alert('密码错误');return;}
    if(r.ok){input.value='';autoResize(input);}
  } catch(e){alert('发送失败: '+e.message);}
}
document.getElementById('termInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTerminalInput();}});

// --- Chat: load history (plain fetch) ---
async function loadMessages() {
  const container = document.getElementById('chatMessages');
  try {
    const res = await fetch(SB_URL+'/rest/v1/messages?order=created_at.desc&limit=100',{headers:SB_HEADERS});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    document.getElementById('chatLoading')?.remove();
    if (!data.length) { container.innerHTML='<div class="chat-empty">还没有消息记录</div>'; return; }
    data.reverse();
    container.innerHTML = '';
    renderedIds.clear();
    data.forEach(m => appendMessage(m));
    scrollToBottom();
  } catch(e) {
    document.getElementById('chatLoading')?.remove();
    document.getElementById('chatMessages').innerHTML='<div class="chat-empty">加载失败: '+e.message+'</div>';
  }
}

function parseThinking(raw) {
  const cleaned = raw.replace(/\[\s*\/\s*think\s*\]/g, '[/think]');
  const m = cleaned.match(/\[think\]([\s\S]*?)\[\/think\]([\s\S]*)/);
  if (m) return { thinking: m[1].trim(), text: m[2].trim() };
  return { thinking: null, text: cleaned };
}

function appendMessage(msg) {
  if (renderedIds.has(msg.id)) return;
  renderedIds.add(msg.id);
  const container = document.getElementById('chatMessages');
  const dir = msg.direction==='in' ? 'out' : 'in';
  const label = msg.direction==='in' ? '慕兮' : '长晏';
  const time = formatTime(new Date(msg.created_at));
  const parsed = parseThinking(msg.content||'');
  const content = escapeHtml(parsed.text);
  let thinkHtml = '';
  if (parsed.thinking) {
    const thinkText = escapeHtml(parsed.thinking);
    thinkHtml = '<div class="thinking-block">' +
      '<div class="thinking-toggle" onclick="this.querySelector(\'.arrow\').classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'open\')">' +
      '<span class="arrow">▶</span> 💭🫧</div>' +
      '<div class="thinking-content">'+thinkText+'</div></div>';
  }
  const div = document.createElement('div');
  div.className = 'msg '+dir;
  const isImg = (parsed.text.startsWith('https://') && /\.(jpg|jpeg|png|gif|webp)/i.test(parsed.text)) || parsed.text.startsWith('[img]');
  let bubbleContent;
  if (isImg) {
    const imgUrl = parsed.text.replace(/^\[img\]/,'').replace(/\[\/img\]$/,'');
    bubbleContent = '<img class="msg-img" src="'+imgUrl+'" onclick="window.open(this.src,\'_blank\')" loading="lazy">';
  } else {
    bubbleContent = formatContent(content);
  }
  const prev = container.lastElementChild;
  const prevDir = prev ? prev.dataset.dir : '';
  const prevTime = prev ? (prev.dataset.ts||'') : '';
  const sameDir = prevDir === msg.direction;
  const closeTime = sameDir && prevTime && (new Date(msg.created_at) - new Date(prevTime)) < 120000;
  const showLabel = !sameDir;
  const showTime = !closeTime;
  if (closeTime && prev) { const pt = prev.querySelector('.msg-time'); if (pt) pt.style.display='none'; }
  const labelHtml = showLabel ? '<div class="msg-label">'+label+'</div>' : '';
  div.dataset.dir = msg.direction;
  div.dataset.ts = msg.created_at;
  div.innerHTML = '<div style="max-width:78%">'+labelHtml+'<div class="msg-bubble">'+bubbleContent+'</div>'+thinkHtml+(showTime?'<div class="msg-time">'+time+'</div>':'')+'</div>';
  container.appendChild(div);
}

function scrollToBottom(){const c=document.getElementById('chatMessages');requestAnimationFrame(()=>{c.scrollTop=c.scrollHeight;});}

// --- Chat: send text ---
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  const token = getToken(); if (!token) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  try {
    await fetch(SB_URL+'/rest/v1/messages',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify({direction:'in',content:text})});
    await fetch(API_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({text})});
    input.value=''; autoResize(input);
    playSendSound();
    if (!realtimeReady) loadMessages();
  } catch(e){alert('发送失败: '+e.message);}
  finally{btn.disabled=false;}
}
document.getElementById('chatInput').addEventListener('input', e => { autoResize(e.target); });

// --- Chat: send image ---
async function sendImages(fileInput) {
  const files = Array.from(fileInput.files);
  if (!files.length) return;

  try {
    const urls = [];
    for (const file of files) {
      const ext = file.name.split('.').pop() || 'jpg';
      const fileName = Date.now() + '_' + Math.random().toString(36).slice(2,8) + '.' + ext;
      const uploadRes = await fetch(SB_URL+'/storage/v1/object/chat-images/'+fileName, {
        method: 'POST',
        headers: {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':file.type},
        body: file
      });
      if (!uploadRes.ok) throw new Error('上传失败 '+uploadRes.status);
      urls.push(SB_URL+'/storage/v1/object/public/chat-images/'+fileName);
    }

    for (const url of urls) {
      await fetch(SB_URL+'/rest/v1/messages',{method:'POST',headers:{...SB_HEADERS,'Prefer':'return=representation'},body:JSON.stringify({direction:'in',content:'[img]'+url+'[/img]'})});
    }

    const token = getToken();
    if (token) {
      const desc = urls.length === 1 ? '一张图片' : urls.length+'张图片';
      await fetch(API_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({text:'[慕兮发了'+desc+': '+urls.join(' ')+']'})});
    }
    if (!realtimeReady) loadMessages();
  } catch(e) {
    alert('图片发送失败: '+e.message);
  }
  fileInput.value = '';
}

// --- Realtime (Supabase JS, loaded async) ---
function trySetupRealtime() {
  if (!window.supabase || !window.supabase.createClient) {
    setTimeout(trySetupRealtime, 1000);
    return;
  }
  try {
    const client = window.supabase.createClient(SB_URL, SB_KEY);
    client.channel('msg-live')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'}, p => {
        appendMessage(p.new);
        scrollToBottom();
        if (p.new.direction === 'out') playReceiveSound();
      })
      .subscribe(status => {
        const dot = document.getElementById('realtimeDot');
        const txt = document.getElementById('realtimeStatus');
        if (status==='SUBSCRIBED') {
          dot.className='realtime-dot on'; txt.textContent='实时连接';
          realtimeReady = true;
          if (pollTimer) { clearInterval(pollTimer); pollTimer=null; }
        } else if (status==='CLOSED'||status==='CHANNEL_ERROR') {
          dot.className='realtime-dot off'; txt.textContent='连接断开 (轮询中)';
          realtimeReady = false;
          startPolling();
        } else {
          dot.className='realtime-dot off'; txt.textContent='连接中...';
        }
      });
  } catch(e) {
    console.error('Realtime setup failed:', e);
    startPolling();
  }
}

function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(() => { if(currentTab==='chat') loadMessages(); }, 5000);
  const txt = document.getElementById('realtimeStatus');
  txt.textContent = '轮询模式 (5秒)';
}

// --- Sound effects ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, vol) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.3;
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function playSendSound() { playTone(1200, 0.08, 0.15); setTimeout(() => playTone(1500, 0.08, 0.12), 70); }
function playReceiveSound() { playTone(800, 0.1, 0.2); setTimeout(() => playTone(1200, 0.1, 0.18), 120); setTimeout(() => playTone(1600, 0.12, 0.15), 250); }

// --- Helpers ---
function formatContent(html){html=html.replace(/\*\*([^*]+)\*\*/g,'<strong style="font-weight:600;color:#e8d5f5">$1</strong>');return html.replace(/\n/g,'<br>');}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function formatTime(d){
  const now=new Date(),h=String(d.getHours()).padStart(2,'0'),m=String(d.getMinutes()).padStart(2,'0');
  if(d.toDateString()===now.toDateString())return h+':'+m;
  const y=new Date(now);y.setDate(y.getDate()-1);
  if(d.toDateString()===y.toDateString())return '昨天 '+h+':'+m;
  return(d.getMonth()+1)+'/'+d.getDate()+' '+h+':'+m;
}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,80)+'px';}

// --- Resume on app switch ---
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    loadMessages();
    trySetupRealtime();
  }
});

// --- Init ---
loadMessages();
trySetupRealtime();
startPolling();
